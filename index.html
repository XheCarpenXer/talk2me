<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sovereign OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --os-bg: #000;
  --dock-bg: rgba(255,255,255,0.10);
  --dock-border: rgba(255,255,255,0.18);
  --glass: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.12);
  --text: #fff;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.3);
  --mono: 'IBM Plex Mono', monospace;
  --brand: 'Syne', sans-serif;
  --ui: 'DM Sans', sans-serif;
  --bar-h: 44px;
  --dock-h: 88px;
}
html, body { height: 100%; overflow: hidden; font-family: var(--ui); background: #000; -webkit-font-smoothing: antialiased; }

/* WALLPAPER */
#wallpaper {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 15% 40%, #0d1554 0%, #060b20 40%, #000 100%);
  overflow: hidden;
}
#wallpaper::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 70%, rgba(99,102,241,0.15) 0%, transparent 60%);
}
#stars { position: absolute; inset: 0; }
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle var(--dur, 3s) ease-in-out infinite var(--del, 0s);
}
@keyframes twinkle { 0%,100%{opacity:var(--lo,.08)} 50%{opacity:var(--hi,.9)} }

/* STATUS BAR */
#statusbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; z-index: 1000; pointer-events: none;
}
#sb-time { font-family: var(--brand); font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
#sb-right { display: flex; align-items: center; gap: 7px; }
.sb-pill {
  background: rgba(255,255,255,0.15); border-radius: 99px;
  padding: 3px 10px; font-family: var(--mono); font-size: 13px; color: rgba(255,255,255,0.95);
  letter-spacing: 0.3px;
}

/* HOME SCREEN */
#homescreen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center;
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#homescreen.hidden { opacity: 0; transform: scale(1.06); pointer-events: none; }

#home-label {
  margin-top: calc(var(--bar-h) + 24px);
  font-family: var(--brand); font-size: 18px; font-weight: 700;
  color: rgba(255,255,255,0.90); letter-spacing: 2px; text-transform: uppercase;
}

#app-grid {
  display: grid; grid-template-columns: repeat(3, 90px);
  gap: 20px 24px; padding: 28px 24px;
  margin-top: 4px;
}
.app-icon {
  display: flex; flex-direction: column; align-items: center; gap: 9px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  animation: iconIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}
.app-icon:nth-child(1) { animation-delay: 0.06s; }
.app-icon:nth-child(2) { animation-delay: 0.12s; }
.app-icon:nth-child(3) { animation-delay: 0.18s; }
@keyframes iconIn { from{opacity:0;transform:scale(0.4) translateY(30px)} to{opacity:1;transform:none} }

.icon-shell {
  width: 88px; height: 88px; border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.12) inset;
  transition: transform 0.16s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.16s;
}
.app-icon:active .icon-shell { transform: scale(0.86); box-shadow: 0 4px 16px rgba(0,0,0,0.6); }

.i-qmesh { background: linear-gradient(145deg, #1a1060 0%, #6366f1 100%); }
.i-ddemo { background: linear-gradient(145deg, #0b2212 0%, #16a34a 100%); }
.i-dik   { background: linear-gradient(145deg, #0e1a0b 0%, #00cc6a 100%); }

.nbadge {
  position: absolute; top: -5px; right: -5px;
  min-width: 20px; height: 20px; border-radius: 10px;
  background: #ff3b30; border: 2.5px solid #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; font-family: var(--mono);
  padding: 0 4px;
}

.icon-label {
  font-size: 16px; font-weight: 600; color: #fff;
  text-align: center; letter-spacing: -0.1px;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
}

/* Home screen bottom info */
#home-hint {
  position: fixed; bottom: calc(var(--dock-h) + 12px); left: 0; right: 0;
  text-align: center; font-family: var(--mono); font-size: 14px;
  color: rgba(255,255,255,0.65); letter-spacing: 0.5px; pointer-events: none;
}

/* DOCK */
#dock {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--dock-h); display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding-bottom: 8px;
}
#dock-inner {
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.20);
  border-radius: 28px; padding: 10px 22px;
  display: flex; gap: 14px; align-items: center;
  box-shadow: 0 2px 40px rgba(0,0,0,0.4);
}
.di {
  width: 62px; height: 62px; border-radius: 17px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; cursor: pointer; position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.di:active { transform: scale(0.86); }
.di.running::after {
  content: '';
  position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.8);
}
.dock-sep { width: 1px; height: 34px; background: rgba(255,255,255,0.15); margin: 0 2px; }

/* APP WINDOWS */
.app-window {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transform: scale(0.9) translateY(50px);
  transition: transform 0.38s cubic-bezier(0.22,1,0.36,1), opacity 0.28s ease;
  overflow: hidden;
}
.app-window.open { opacity: 1; transform: none; pointer-events: all; }
.app-window.closing { transform: scale(0.88) translateY(60px); opacity: 0; }

.win-bar {
  height: var(--bar-h); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; position: relative; z-index: 5;
}
.win-back {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer;
  font-size: 18px; font-family: var(--ui); font-weight: 500;
  padding: 7px 10px; border-radius: 10px;
  transition: background 0.15s;
}
.win-back:hover { background: rgba(255,255,255,0.1); }
.win-back svg { width: 10px; height: 16px; }
.win-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: var(--brand); font-size: 18px; font-weight: 700;
  pointer-events: none;
}
.app-frame { flex: 1; overflow: hidden; position: relative; }
.app-content { width: 100%; height: 100%; overflow: auto; }

/* qmesh needs flex column for its internal layout */
#qmesh-content { display: flex; flex-direction: column; overflow: hidden; }
#dik-content { overflow: hidden; }
</style>
</head>
<body>

<div id="wallpaper"><div id="stars"></div></div>

<div id="statusbar">

<!-- ══════ APP WINDOWS ══════ -->

<div class="app-window" id="win-qmesh">

<div class="app-window" id="win-ddemo">
  <div class="win-bar" style="background:#111;border-bottom:1px solid #333">
    <button class="win-back" style="color:#ddd" onclick="closeApp('ddemo')">
      <svg viewBox="0 0 10 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="8 1 2 8 8 15"/></svg>
      Home
    </button>

      <svg viewBox="0 0 10 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="8 1 2 8 8 15"/></svg>

</div>

<script>
// ── Clock ──
function tick() {
  const n = new Date();
  document.getElementById('sb-time').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick, 5000);

// ── Stars ──
(function(){
  const s = document.getElementById('stars');
  for (let i=0; i<90; i++) {
    const e = document.createElement('div');
    e.className = 'star';
    const sz = Math.random() < 0.6 ? 1 : Math.random() < 0.5 ? 2 : 3;
    e.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*5}s;--del:-${Math.random()*6}s;--lo:${(0.05+Math.random()*0.1).toFixed(2)};--hi:${(0.5+Math.random()*0.5).toFixed(2)}`;
    s.appendChild(e);
  }
})();

// ── App bodies (lazy-loaded) ──
const APP_BODIES = {
  qmesh: `<style>
/* ── Reset & Base ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #050810;
  --bg2:     #090d1a;
  --bg3:     #0e1426;
  --border:  rgba(100,120,255,0.12);
  --border2: rgba(100,120,255,0.06);
  --indigo:  #6366f1;
  --cyan:    #22d3ee;
  --violet:  #a78bfa;
  --emerald: #34d399;
  --amber:   #fbbf24;
  --rose:    #fb7185;
  --slate:   #475569;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --dim:     #1e293b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Header ── */
#header {
  height: 52px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 20;
}

#logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.12em;
  color: var(--violet);
  white-space: nowrap;
}

#logo span { color: var(--cyan); }

.hbtn {
  padding: 5px 13px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  border-radius: 5px;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  transition: all 0.18s;
  white-space: nowrap;
}
.hbtn:hover { border-color: var(--indigo); color: var(--violet); }
.hbtn.active {
  background: rgba(99,102,241,0.15);
  border-color: var(--indigo);
  color: var(--violet);
}

#status-bar {
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

#status-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--emerald);
  border-radius: 50%;
  margin-right: 6px;
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Main layout ── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Canvas ── */
#canvas-wrap {
  flex: 1;
  position: relative;
  min-width: 0;
}

#mesh {
  width: 100%;
  height: 100%;
  cursor: default;
  display: block;
}

/* ── HUD overlays ── */
#hud-legend {
  position: absolute;
  top: 16px;
  left: 16px;
  padding: 12px 14px;
  background: rgba(9,13,26,0.85);
  border: 1px solid var(--border);
  border-radius: 8px;
  backdrop-filter: blur(12px);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  line-height: 1.9;
  pointer-events: none;
}

#hud-legend .lrow {
  display: flex;
  align-items: center;
  gap: 8px;
}

.ldot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

#node-inspector {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 200px;
  padding: 14px;
  background: rgba(9,13,26,0.9);
  border: 1px solid var(--border);
  border-radius: 8px;
  backdrop-filter: blur(12px);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
#node-inspector.visible { opacity: 1; }
#ni-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 10px; font-family: 'Syne', sans-serif; }
.ni-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.ni-label { color: var(--muted); width: 60px; flex-shrink: 0; }
.ni-bar-wrap { flex: 1; height: 3px; background: var(--dim); border-radius: 2px; overflow: hidden; }
.ni-bar { height: 100%; border-radius: 2px; transition: width 0.4s; }
.ni-val { width: 28px; text-align: right; color: var(--slate); }

#hud-help {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  line-height: 1.9;
  opacity: 0.7;
  pointer-events: none;
}

/* ── Toast ── */
#toast {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(99,102,241,0.95);
  color: white;
  padding: 7px 18px;
  border-radius: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  opacity: 0;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
  white-space: nowrap;
  z-index: 50;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Chat panel ── */
#chat-panel {
  width: 0;
  min-width: 0;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.32s cubic-bezier(0.4,0,0.2,1),
              min-width 0.32s cubic-bezier(0.4,0,0.2,1);
  flex-shrink: 0;
}
#chat-panel.open { width: 360px; min-width: 360px; }

/* Chat header */
#chat-head {
  padding: 16px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

#chat-close {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  margin-left: auto;
  flex-shrink: 0;
}
#chat-close:hover { border-color: var(--rose); color: var(--rose); }

#chat-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

#chat-info { flex: 1; min-width: 0; }
#chat-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#chat-state {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.04em;
}

/* Overlap meter */
#overlap-bar-wrap {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
}

#overlap-label {
  display: flex;
  justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}

#overlap-track {
  height: 4px;
  background: var(--dim);
  border-radius: 2px;
  overflow: hidden;
}

#overlap-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--indigo), var(--cyan));
  border-radius: 2px;
  width: 0%;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}

/* State vectors side by side */
#state-vectors {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border2);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  flex-shrink: 0;
}

.sv-block { }
.sv-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 5px;
}

.sv-bars { display: flex; gap: 2px; height: 20px; align-items: flex-end; }
.sv-bar {
  flex: 1;
  border-radius: 1px 1px 0 0;
  min-height: 2px;
  transition: height 0.4s ease;
}

/* Messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}

#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.msg-group { display: flex; flex-direction: column; gap: 3px; }
.msg-group.sent { align-items: flex-end; }
.msg-group.recv { align-items: flex-start; }

.msg-bubble {
  max-width: 82%;
  padding: 8px 13px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 300;
  line-height: 1.5;
  animation: msg-appear 0.28s cubic-bezier(0.4,0,0.2,1);
}

@keyframes msg-appear {
  from {
    opacity: 0;
    transform: scale(0.9) translateY(6px);
    filter: blur(3px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);

<script>
'use strict';

// ═══════════════════════════════════════════════════
//   CONSTANTS
// ═══════════════════════════════════════════════════

const TAU = Math.PI * 2;

const BASIS_LABELS  = ['available','thinking','busy','away','deep-focus','offline'];
const BASIS_COLORS  = ['#22d3ee','#fbbf24','#fb7185','#475569','#a78bfa','#1e3a5f'];
const BASIS_LIGHT   = ['#67e8f9','#fde68a','#fda4af','#94a3b8','#c4b5fd','#334155'];

// Hue-shifted node palette — each user has a distinct identity color
const USER_COLORS = ['#6366f1','#22d3ee','#34d399','#f59e0b','#f472b6','#a78bfa'];

// ═══════════════════════════════════════════════════
//   UTILS
// ═══════════════════════════════════════════════════

function normalize(v) {
  const s = v.reduce((a, b) => a + b, 0);
  return s === 0 ? v.map(() => 1/v.length) : v.map(x => x/s);
}

function lerp(a, b, t) { return a + (b-a) * t; }

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function randInt(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }

function randFloat(lo, hi) { return lo + Math.random() * (hi - lo); }

function randPick(arr) { return arr[randInt(0, arr.length - 1)]; }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function rgba(hex, alpha) {
  const { r, g, b } = hexToRgb(hex);
  return \`rgba(\${r},\${g},\${b},\${alpha.toFixed(3)})\`;
}

function dist2(ax, ay, bx, by) {
  return Math.sqrt((ax-bx)**2 + (ay-by)**2);
}

function dominantIdx(v) {
  return v.indexOf(Math.max(...v));
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

// ═══════════════════════════════════════════════════
//   QNODE — one user
// ═══════════════════════════════════════════════════

class QNode {
  constructor({ id, name, initials, colorIdx, x, y, isYou = false }) {
    this.id       = id;
    this.name     = name;
    this.initials = initials;
    this.color    = USER_COLORS[colorIdx % USER_COLORS.length];
    this.x        = x;
    this.y        = y;
    this.isYou    = isYou;

    // State vector across 6 basis states
    if (isYou) {
      this.amps = normalize([0.75, 0.15, 0.05, 0.02, 0.02, 0.01]);
    } else {
      const raw = Array.from({ length: 6 }, () => Math.random() * Math.random());
      this.amps = normalize(raw);
    }

    this.entanglements = new Set(); // Set<nodeId>
    this.channels = {};             // { nodeId: Message[] }
    this.overlap  = {};             // { nodeId: 0..1 }
    this.unread   = {};             // { nodeId: count }
    this.isTyping = {};             // { nodeId: bool }

    // Animation
    this.phase   = Math.random() * TAU;
    this.radius  = 36;
    this.glow    = 0;               // 0..1 glow pulse on message
  }

  get dominantState() { return dominantIdx(this.amps); }
  get stateLabel()    { return BASIS_LABELS[this.dominantState]; }
  get stateColor()    { return BASIS_COLORS[this.dominantState]; }

  collapseToward(basisIdx, strength) {
    this.amps = normalize(this.amps.map((v, i) => {
      return lerp(v, i === basisIdx ? 1 : 0, strength);
    }));
    this.glow = 1;
  }

  // Overlap: this node's state drifts toward other's
  overlapWith(other, amount) {
    this.amps = normalize(this.amps.map((v, i) => lerp(v, other.amps[i], amount)));
    this.overlap[other.id] = clamp((this.overlap[other.id] || 0) + amount * 1.5, 0, 1);
  }

  tick(dt) {
    this.phase = (this.phase + 0.018) % TAU;
    this.glow  = Math.max(0, this.glow - dt * 1.2);

    // Slow thermal drift back toward superposition
    const even = Array(6).fill(1/6);
    this.amps = normalize(this.amps.map((v, i) => lerp(v, even[i], 0.0005)));
  }
}

// ═══════════════════════════════════════════════════
//   PARTICLE — message in transit
// ═══════════════════════════════════════════════════

class Particle {
  constructor(from, to, color) {
    this.from  = from;
    this.to    = to;
    this.color = color;
    this.t     = 0;
    this.done  = false;
  }
  tick() {
    this.t += 0.022;
    if (this.t >= 1) { this.t = 1; this.done = true; }
  }
  get pos() {
    const e = this.t < 0.5
      ? 2 * this.t * this.t
      : -1 + (4 - 2 * this.t) * this.t;
    return {
      x: lerp(this.from.x, this.to.x, e),
      y: lerp(this.from.y, this.to.y, e)
    };
  }
}

// ═══════════════════════════════════════════════════
//   QUANTUM MESH — the graph engine
// ═══════════════════════════════════════════════════

class QuantumMesh {
  constructor() {
    this.nodes     = [];
    this.particles = [];
    this.you       = null;
    this.time      = 0;
    // Interaction state
    this.mode         = 'select';  // 'select' | 'entangle' | 'break'
    this.selected     = null;      // nodeId
    this.entangleA    = null;      // first node in entangle flow
    this.activeChat   = null;      // nodeId of open channel
  }

  add(node) {
    this.nodes.push(node);
    if (node.isYou) this.you = node;
  }

  get(id) { return this.nodes.find(n => n.id === id); }

  entangle(aId, bId) {
    const a = this.get(aId), b = this.get(bId);
    if (!a || !b || aId === bId || a.entanglements.has(bId)) return false;
    a.entanglements.add(bId);
    b.entanglements.add(aId);
    if (!a.channels[bId]) a.channels[bId] = [];
    if (!b.channels[aId]) b.channels[aId] = [];
    if (!a.overlap[bId]) a.overlap[bId] = 0.05;
    if (!b.overlap[aId]) b.overlap[aId] = 0.05;
    // Initial state pull on entanglement
    a.overlapWith(b, 0.04);
    b.overlapWith(a, 0.04);
    return true;
  }

  deentangle(aId, bId) {
    const a = this.get(aId), b = this.get(bId);
    if (!a || !b) return;
    a.entanglements.delete(bId);
    b.entanglements.delete(aId);
  }

  isLinked(aId, bId) {
    const a = this.get(aId);
    return a ? a.entanglements.has(bId) : false;
  }

  get linkCount() {
    let n = 0;
    for (const nd of this.nodes)
      n += nd.entanglements.size;
    return n / 2;
  }

  send(fromId, toId, text) {
    const from = this.get(fromId), to = this.get(toId);
    if (!from || !to || !this.isLinked(fromId, toId)) return null;

    const msg = { text, fromId, toId, ts: Date.now() };

    if (!from.channels[toId]) from.channels[toId] = [];
    if (!to.channels[fromId]) to.channels[fromId] = [];
    from.channels[toId].push(msg);
    to.channels[fromId].push(msg);

    // Sender collapses toward available (active engagement)
    from.collapseToward(0, 0.25);
    // Receiver collapses toward thinking
    to.collapseToward(1, 0.3);

    // State overlap deepens with every message
    from.overlapWith(to, 0.07);
    to.overlapWith(from, 0.07);

    // Particle
    this.particles.push(new Particle(from, to, from.color));

    // Chain propagation: nodes entangled with receiver feel a ripple
    for (const eid of to.entanglements) {
      if (eid !== fromId) {
        const chain = this.get(eid);
        if (chain) {
          chain.collapseToward(1, 0.04);
          setTimeout(() => {
            this.particles.push(new Particle(to, chain, to.color));
          }, 300);
        }
      }
    }

    // Unread
    if (this.activeChat !== toId || !this.you || this.you.id !== toId) {
      if (to.id !== (this.you && this.you.id)) {
        // noop: other user
      } else {
        to.unread[fromId] = (to.unread[fromId] || 0) + 1;
      }
    }

    return msg;
  }

  openChat(nodeId) {
    if (!this.you || !this.isLinked(this.you.id, nodeId)) return;
    this.activeChat = nodeId;
    this.you.unread[nodeId] = 0;
  }

  closeChat() { this.activeChat = null; }

  nodeAt(x, y) {
    for (let i = this.nodes.length - 1; i >= 0; i--) {
      const n = this.nodes[i];
      if (dist2(n.x, n.y, x, y) <= n.radius + 10) return n;
    }
    return null;
  }

  tick(dt) {
    this.time += dt;
    for (const n of this.nodes) n.tick(dt);
    this.particles = this.particles.filter(p => { p.tick(); return !p.done; });
  }
}

// ═══════════════════════════════════════════════════
//   RENDERER
// ═══════════════════════════════════════════════════

class Renderer {
  constructor(canvas, mesh) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.mesh   = mesh;
    this._w     = 0;
    this._h     = 0;
    this.dpr    = devicePixelRatio || 1;
  }

  get W() { return this.canvas.offsetWidth; }
  get H() { return this.canvas.offsetHeight; }

  resize() {
    const w = this.W, h = this.H;
    if (this._w !== w || this._h !== h) {
      this.canvas.width  = w * this.dpr;
      this.canvas.height = h * this.dpr;
      this._w = w; this._h = h;
    }
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }

  clear() {
    this.ctx.clearRect(0, 0, this.W, this.H);
  }

  drawGrid() {
    const { ctx, W, H } = this;
    const step = 44;
    ctx.strokeStyle = 'rgba(100,120,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x < W; x += step) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = 0; y < H; y += step) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();
  }

  drawEntanglementLine(a, b) {
    const { ctx, mesh } = this;
    const t = mesh.time;
    const dx = b.x - a.x, dy = b.y - a.y;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < 1) return;

    const overlap = Math.max(a.overlap[b.id] || 0, b.overlap[a.id] || 0);
    const activity = a.glow + b.glow;

    // Wave amplitude grows with overlap and recent messages
    const waveAmp  = 4 + overlap * 16 + activity * 6;
    const waveFreq = 0.04 + overlap * 0.015;
    const speed    = 2.5 + overlap;

    const nx = -dy/d, ny = dx/d; // perpendicular
    const steps = Math.max(2, Math.floor(d / 3));

    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const f  = i / steps;
      const px = a.x + dx * f;
      const py = a.y + dy * f;
      // envelope = 0 at endpoints, peak at midpoint
      const env  = Math.sin(f * Math.PI);
      const wave = Math.sin(f * d * waveFreq + t * speed) * waveAmp * env;
      const cx   = px + nx * wave;
      const cy   = py + ny * wave;
      i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
    }

    const grd = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    const alpha = 0.18 + overlap * 0.55 + activity * 0.15;
    grd.addColorStop(0, rgba(a.color, alpha));
    grd.addColorStop(1, rgba(b.color, alpha));

    ctx.strokeStyle = grd;
    ctx.lineWidth   = 1 + overlap * 2.5;
    ctx.shadowColor = rgba(a.color, 0.25);
    ctx.shadowBlur  = overlap * 8;
    ctx.stroke();
    ctx.shadowBlur  = 0;

    // Unread badge on midpoint
    const you = mesh.you;
    if (you) {
      const otherId = a.isYou ? b.id : (b.isYou ? a.id : null);
      if (otherId) {
        const unread = (you.unread[otherId] || 0);
        if (unread > 0) {
          const mx = (a.x + b.x) / 2 + nx * 10;
          const my = (a.y + b.y) / 2 + ny * 10;
          ctx.fillStyle = '#fb7185';
          ctx.shadowColor = '#fb7185';
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(mx, my, 9, 0, TAU);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'white';
          ctx.font = 'bold 9px DM Sans';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(Math.min(unread, 9), mx, my);
        }
      }
    }
  }

  drawParticle(p) {
    const { ctx } = this;
    const { x, y } = p.pos;
    const alpha = Math.sin(p.t * Math.PI);
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 14;
    ctx.fillStyle   = rgba(p.color, alpha);
    ctx.beginPath();
    ctx.arc(x, y, 4.5, 0, TAU);
    ctx.fill();
    // Trail
    ctx.fillStyle = rgba(p.color, alpha * 0.3);
    ctx.beginPath();
    ctx.arc(x, y, 7, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  drawNode(node) {
    const { ctx, mesh } = this;
    const { x, y, radius, color, phase, glow, amps } = node;
    const isActive = mesh.activeChat === node.id || mesh.selected === node.id;
    const isEntangleTarget = mesh.mode === 'entangle' && mesh.entangleA &&
                             mesh.entangleA !== node.id;

    // Amplitude rings (6 state arcs around the node)
    const ringR = radius + 14;
    amps.forEach((amp, i) => {
      if (amp < 0.02) return;
      const startA = (i / 6) * TAU - TAU/4;
      const endA   = startA + amp * TAU * 0.88;
      ctx.beginPath();
      ctx.arc(x, y, ringR + i * 2.2, startA, endA);
      ctx.strokeStyle = rgba(BASIS_COLORS[i], 0.55 + amp * 0.4);
      ctx.lineWidth   = 2;
      ctx.stroke();
    });

    // Outer glow
    if (glow > 0.01 || isActive) {
      const grd = ctx.createRadialGradient(x, y, 0, x, y, radius + 28);
      const ga = (isActive ? 0.22 : 0) + glow * 0.35;
      grd.addColorStop(0, rgba(color, ga));
      grd.addColorStop(1, rgba(color, 0));
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(x, y, radius + 28, 0, TAU);
      ctx.fill();
    }

    // Breathing pulse ring
    const breathR = radius + 4 + Math.sin(phase) * 2.5;
    ctx.beginPath();
    ctx.arc(x, y, breathR, 0, TAU);
    ctx.strokeStyle = rgba(color, 0.15 + Math.sin(phase) * 0.05);
    ctx.lineWidth = 1;
    ctx.stroke();

    // Main disc
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, TAU);
    ctx.fillStyle = '#090d1a';
    ctx.fill();
    // Tinted inner fill based on dominant state
    const grd2 = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grd2.addColorStop(0, rgba(node.stateColor, 0.18));
    grd2.addColorStop(1, rgba(node.stateColor, 0.04));
    ctx.fillStyle = grd2;
    ctx.fill();

    // Border
    ctx.strokeStyle = isActive
      ? rgba(color, 0.9)
      : rgba(color, 0.4 + glow * 0.3);
    ctx.lineWidth = isActive ? 2 : 1.5;
    ctx.stroke();

    // Entangle mode: dashed target ring
    if (isEntangleTarget) {
      const aring = radius + 7 + Math.sin(mesh.time * 4) * 2;
      ctx.beginPath();
      ctx.arc(x, y, aring, 0, TAU);
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = rgba('#a78bfa', 0.5);
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Break mode: X overlay on entangled-with-you nodes
    if (mesh.mode === 'break' && mesh.you && node.entanglements.has(mesh.you.id) && !node.isYou) {
      ctx.strokeStyle = rgba('#fb7185', 0.7);
      ctx.lineWidth = 2;
      const sz = 10;
      ctx.beginPath();
      ctx.moveTo(x - sz, y - sz); ctx.lineTo(x + sz, y + sz);
      ctx.moveTo(x + sz, y - sz); ctx.lineTo(x - sz, y + sz);
      ctx.stroke();
    }

    // Initials
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = rgba(color, 0.95);
    ctx.font = \`700 \${node.isYou ? 12 : 11}px 'Syne', sans-serif\`;
    ctx.fillText(node.initials, x, y - 5);

    // State label inside
    ctx.fillStyle = rgba(node.stateColor, 0.8);
    ctx.font = \`300 8px 'IBM Plex Mono', monospace\`;
    ctx.fillText(node.stateLabel, x, y + 8);

    // Name below
    ctx.fillStyle = rgba(color, 0.6);
    ctx.font = \`400 11px 'DM Sans', sans-serif\`;
    ctx.fillText(node.name, x, y + radius + 14);

    // Entangled indicator
    if (mesh.you && node.entanglements.has(mesh.you.id) && !node.isYou) {
      ctx.fillStyle = rgba('#a78bfa', 0.9);
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⊗', x + radius - 4, y - radius + 5);
    }
  }

  draw() {
    this.resize();
    this.clear();
    this.drawGrid();

    const { mesh } = this;

    // Draw entanglement lines (unique pairs)
    const drawn = new Set();
    for (const node of mesh.nodes) {
      for (const eid of node.entanglements) {
        const key = [node.id, eid].sort().join('|');
        if (drawn.has(key)) continue;
        drawn.add(key);
        const other = mesh.get(eid);
        if (other) this.drawEntanglementLine(node, other);
      }
    }

    // Particles
    for (const p of mesh.particles) this.drawParticle(p);

    // Nodes
    for (const node of mesh.nodes) this.drawNode(node);
  }
}

function scheduleReply(mesh, fromId, toId, ui) {
  const from = mesh.get(fromId);
  if (!from) return;
  const delay = randInt(1100, 2800);

  // Show typing
  from.isTyping[toId] = true;
  from.collapseToward(1, 0.35); // thinking
  ui.refreshChat();

  setTimeout(() => {
    from.isTyping[toId] = false;
    from.collapseToward(0, 0.25);
    const text = randPick(REPLIES[fromId] || ['…']);
    mesh.send(fromId, toId, text);
    ui.refreshChat();
    ui.updateChatHeader();
  }, delay);
}

class UI {
  constructor(mesh) {
    this.mesh = mesh;
    this._lastMsgLen = 0;

    this.$panel   = document.getElementById('chat-panel');
    this.$msgs    = document.getElementById('messages');
    this.$input   = document.getElementById('msg-input');
    this.$sendBtn = document.getElementById('send-btn');
    this.$spSegs  = [...document.querySelectorAll('.sp-seg')];
    this.$ni      = document.getElementById('node-inspector');
    this.$niName  = document.getElementById('ni-name');
    this.$niRows  = document.getElementById('ni-rows');
    this.$svYou   = document.getElementById('sv-you');
    this.$svOther = document.getElementById('sv-other');
    this.$toast   = document.getElementById('toast');

    this._bindEvents();
  }

  _bindEvents() {
    // Send
    this.$sendBtn.addEventListener('click', () => this._send());
    this.$input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this._send(); }
    });
    this.$input.addEventListener('input', e => {
      this._updateSuperposition(e.target.value);
      // Typing collapses you toward "thinking"
      if (e.target.value && this.mesh.you) this.mesh.you.collapseToward(1, 0.015);
    });

    // Close chat
    document.getElementById('chat-close').addEventListener('click', () => {
      this.mesh.closeChat();
      this.refreshPanel();
    });

    // Header buttons
    document.getElementById('btn-entangle').addEventListener('click', () => this._setMode('entangle'));
    document.getElementById('btn-deentangle').addEventListener('click', () => this._setMode('break'));
    document.getElementById('btn-measure').addEventListener('click', () => this._measureAll());
  }

  _setMode(mode) {
    if (this.mesh.mode === mode) {
      this.mesh.mode = 'select';
      this.mesh.entangleA = null;
    } else {
      this.mesh.mode = mode;
      this.mesh.entangleA = null;
    }
    this._syncModeButtons();
    this.toast(this.mesh.mode === 'select'
      ? 'SELECT mode'
      : this.mesh.mode === 'entangle'
        ? '⊗ ENTANGLE: click two nodes to link'
        : '⊘ BREAK: click a linked node to disconnect');
  }

  _syncModeButtons() {
    document.getElementById('btn-entangle').classList.toggle('active', this.mesh.mode === 'entangle');
    document.getElementById('btn-deentangle').classList.toggle('active', this.mesh.mode === 'break');
  }

  _measureAll() {
    for (const n of this.mesh.nodes) {
      const wi = n.amps.map((v, i) => ({ v, i }));
      let rand = Math.random(), cumul = 0, chosen = 0;
      for (const { v, i } of wi) { cumul += v; if (rand <= cumul) { chosen = i; break; } }
      n.collapseToward(chosen, 0.85);
    }
    this.toast('◉ All nodes measured — states collapsed');
  }

  _send() {
    const { mesh } = this;
    if (!mesh.activeChat || !mesh.you) return;
    const text = this.$input.value.trim();
    if (!text) return;

    mesh.send(mesh.you.id, mesh.activeChat, text);
    this.$input.value = '';
    this._updateSuperposition('');
    this.refreshChat();
    this.updateChatHeader();

    // Schedule auto-reply from the other user
    scheduleReply(mesh, mesh.activeChat, mesh.you.id, this);
  }

  _updateSuperposition(text) {
    const intents = {
      question:  /\\?/.test(text) ? 0.5 : 0.1,
      thinking:  /how|why|what|when|where|think|maybe|perhaps/i.test(text) ? 0.4 : 0.08,
      busy:      /no|not|can't|wont|wrong|bad/i.test(text) ? 0.5 : 0.05,
      away:      /later|brb|afk|tomorrow|soon/i.test(text) ? 0.45 : 0.07,
      excited:   /!|wow|great|yes|yay|amazing|love|cool/i.test(text) ? 0.5 : 0.08,
      neutral:   0.12,
    };
    const weights = [
      intents.question,
      intents.thinking,
      intents.busy,
      intents.away,
      intents.excited,
      intents.neutral,
    ];
    const norm = normalize(weights);
    const maxIntent = Math.max(...norm);
    const labelMap = ['question','thinking','busy','away','excited','neutral'];
    const idx = norm.indexOf(maxIntent);
    const sp = document.getElementById('sp-intent');
    if (sp) sp.textContent = text ? labelMap[idx].toUpperCase() : '—';

    this.$spSegs.forEach((seg, i) => {
      const h = text ? Math.max(4, Math.round(norm[i] * 16)) : 2;
      seg.style.height  = h + 'px';
      seg.style.flex    = (norm[i] * 6).toFixed(2);
      seg.style.background = BASIS_COLORS[i];
      seg.style.opacity = text ? '1' : '0.3';
    });
  }

  // ── Node click handling ──

  handleNodeClick(node) {
    const { mesh } = this;

    if (mesh.mode === 'entangle') {
      if (!mesh.entangleA) {
        mesh.entangleA = node.id;
        this.toast(\`⊗ Selected \${node.name} — now click another node\`);
      } else if (mesh.entangleA !== node.id) {
        const ok = mesh.entangle(mesh.entangleA, node.id);
        const aNode = mesh.get(mesh.entangleA);
        this.toast(ok
          ? \`⊗ \${aNode.name} ↔ \${node.name} entangled\`
          : \`Already linked!\`);
        mesh.entangleA = null;
        mesh.mode = 'select';
        this._syncModeButtons();
        this._updateStatusBar();
      }
      return;
    }

    if (mesh.mode === 'break') {
      if (mesh.you && mesh.isLinked(mesh.you.id, node.id) && !node.isYou) {
        mesh.deentangle(mesh.you.id, node.id);
        if (mesh.activeChat === node.id) { mesh.closeChat(); this.refreshPanel(); }
        this.toast(\`⊘ Unlinked from \${node.name}\`);
        this._updateStatusBar();
      }
      return;
    }

    // Select mode
    mesh.selected = node.id;
    this._showInspector(node);
  }

  handleNodeDblClick(node) {
    const { mesh } = this;
    if (node.isYou) return;
    if (mesh.isLinked(mesh.you?.id, node.id)) {
      mesh.openChat(node.id);
      this.refreshPanel();
    } else {
      this.toast(\`Not entangled — use ⊗ ENTANGLE first\`);
    }
  }

  _showInspector(node) {
    this.$ni.classList.add('visible');
    this.$niName.textContent = node.name.toUpperCase() + ' · ' + node.stateLabel;
    this.$niName.style.color = node.color;
    this.$niRows.innerHTML = BASIS_LABELS.map((label, i) => \`
      <div class="ni-row">
        <div class="ni-label">\${label}</div>
        <div class="ni-bar-wrap">
          <div class="ni-bar" style="width:\${Math.round(node.amps[i]*100)}%;background:\${BASIS_COLORS[i]}"></div>
        </div>
        <div class="ni-val">\${Math.round(node.amps[i]*100)}%</div>
      </div>
    \`).join('');
  }

  hideInspector() {
    this.$ni.classList.remove('visible');
    this.mesh.selected = null;
  }

  // ── Chat panel ──

  refreshPanel() {
    const { mesh } = this;
    if (!mesh.activeChat) {
      this.$panel.classList.remove('open');
      return;
    }
    this.$panel.classList.add('open');
    this.updateChatHeader();
    this.refreshChat();
  }

  updateChatHeader() {
    const { mesh } = this;
    if (!mesh.activeChat || !mesh.you) return;
    const other = mesh.get(mesh.activeChat);
    if (!other) return;

    const av = document.getElementById('chat-avatar');
    av.textContent = other.initials;
    av.style.background = rgba(other.color, 0.18);
    av.style.border = \`2px solid \${rgba(other.color, 0.6)}\`;
    av.style.color = other.color;

    document.getElementById('chat-name').textContent = other.name;
    const ol = Math.round((other.overlap[mesh.you.id] || 0) * 100);
    document.getElementById('chat-state').textContent =
      \`\${other.stateLabel} · overlap \${ol}%\`;

    // Overlap bar
    const pct = Math.min(100, Math.round((other.overlap[mesh.you.id] || 0) * 100));
    document.getElementById('overlap-fill').style.width = pct + '%';
    document.getElementById('overlap-pct').textContent = pct + '%';

    // State vectors
    document.getElementById('sv-other-label').textContent = other.name.toUpperCase().slice(0,6) + ' ψ';
    this._renderStateVec(this.$svYou,   mesh.you);
    this._renderStateVec(this.$svOther, other);
  }

  _renderStateVec(el, node) {
    el.innerHTML = '';
    node.amps.forEach((amp, i) => {
      const bar = document.createElement('div');
      bar.className = 'sv-bar';
      bar.style.background = BASIS_COLORS[i];
      bar.style.height = Math.max(2, Math.round(amp * 20)) + 'px';
      bar.style.flex = (amp * 6).toFixed(2);
      bar.title = BASIS_LABELS[i] + ' ' + Math.round(amp*100) + '%';
      el.appendChild(bar);
    });
  }

  refreshChat() {
    const { mesh } = this;
    if (!mesh.activeChat || !mesh.you) return;
    const other   = mesh.get(mesh.activeChat);
    if (!other) return;

    const msgs = mesh.you.channels[mesh.activeChat] || [];
    const atBot = this.$msgs.scrollHeight - this.$msgs.scrollTop - this.$msgs.clientHeight < 40;

    if (msgs.length === 0 && !other.isTyping[mesh.you.id]) {
      this.$msgs.innerHTML = \`
        <div class="empty-state">
          <div class="empty-glyph">⟨ψ⟩</div>
          Entangled — superposition collapsed<br>
          send first message to materialize
        </div>\`;
      return;
    }

    this.$msgs.innerHTML = '';

    // Group consecutive messages from same sender
    let lastFrom = null;
    let grp = null;

    for (const msg of msgs) {
      const isSent = msg.fromId === mesh.you.id;
      const side = isSent ? 'sent' : 'recv';

      if (msg.fromId !== lastFrom) {
        grp = document.createElement('div');
        grp.className = \`msg-group \${side}\`;
        this.$msgs.appendChild(grp);
        lastFrom = msg.fromId;
      }

      const bubble = document.createElement('div');
      bubble.className = \`msg-bubble \${side}\`;
      bubble.textContent = msg.text;
      grp.appendChild(bubble);
    }

    // Meta on last bubble of each group
    const metas = this.$msgs.querySelectorAll('.msg-group');
    metas.forEach(g => {
      const last = g.lastElementChild;
      if (last && last.classList.contains('msg-bubble')) {
        const lastMsg = msgs.filter(m =>
          (m.fromId === mesh.you.id) === g.classList.contains('sent')
        ).pop();
        if (lastMsg) {
          const meta = document.createElement('div');
          meta.className = 'msg-meta';
          meta.textContent = fmtTime(lastMsg.ts);
          g.appendChild(meta);
        }
      }
    });

    // Typing indicator
    if (other.isTyping[mesh.you.id]) {
      const ti = document.createElement('div');
      ti.className = 'typing-bubble';
      ti.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
      this.$msgs.appendChild(ti);
    }

    if (atBot || msgs.length !== this._lastMsgLen) {
      this.$msgs.scrollTop = this.$msgs.scrollHeight;
    }
    this._lastMsgLen = msgs.length;
  }

  _updateStatusBar() {
    document.getElementById('status-txt').textContent =
      \`MESH ONLINE · \${this.mesh.linkCount} LINK\${this.mesh.linkCount !== 1 ? 'S' : ''}\`;
  }

  toast(msg, dur = 2600) {
    clearTimeout(this._toastTimer);
    this.$toast.textContent = msg;
    this.$toast.classList.add('show');
    this._toastTimer = setTimeout(() => this.$toast.classList.remove('show'), dur);
  }
}

function setup(mesh) {
  const canvas = document.getElementById('mesh');
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  const cx = W / 2, cy = H / 2;
  const spread = Math.min(W, H) * 0.32;

  const users = [
    { id:'you',     name:'You',     initials:'YOU', colorIdx:0, x:cx,                    y:cy,                    isYou:true  },
    { id:'alice',   name:'Alice',   initials:'AL',  colorIdx:1, x:cx + Math.cos(0.3)*spread,    y:cy + Math.sin(0.3)*spread * 0.7    },
    { id:'bob',     name:'Bob',     initials:'BO',  colorIdx:2, x:cx + Math.cos(2.4)*spread,    y:cy + Math.sin(2.4)*spread * 0.7    },
    { id:'charlie', name:'Charlie', initials:'CH',  colorIdx:3, x:cx + Math.cos(4.1)*spread,    y:cy + Math.sin(4.1)*spread * 0.7    },
    { id:'diana',   name:'Diana',   initials:'DI',  colorIdx:4, x:cx + Math.cos(5.2)*spread,    y:cy + Math.sin(5.2)*spread * 0.7    },
    { id:'enzo',    name:'Enzo',    initials:'EN',  colorIdx:5, x:cx + Math.cos(1.5)*spread*1.15, y:cy + Math.sin(1.5)*spread * 0.6  },
  ];

  // Distinct initial states
  const initAmps = [
    null,  // you — handled in constructor
    [0.7, 0.15, 0.05, 0.04, 0.04, 0.02],  // alice — mostly available
    [0.08, 0.12, 0.65, 0.08, 0.05, 0.02], // bob — mostly busy
    [0.05, 0.05, 0.05, 0.08, 0.72, 0.05], // charlie — deep focus
    [0.15, 0.55, 0.12, 0.1,  0.05, 0.03], // diana — thinking
    [0.12, 0.1,  0.08, 0.62, 0.04, 0.04], // enzo — away
  ];

  users.forEach((def, i) => {
    const node = new QNode(def);
    if (initAmps[i]) node.amps = normalize(initAmps[i]);
    mesh.add(node);
  });

  // Pre-entangle: you ↔ alice, you ↔ bob
  mesh.entangle('you', 'alice');
  mesh.entangle('you', 'bob');
  mesh.entangle('alice', 'charlie');
  mesh.entangle('bob', 'diana');
  mesh.entangle('charlie', 'enzo');
}

const mesh     = new QuantumMesh();
const canvas   = document.getElementById('mesh');
const renderer = new Renderer(canvas, mesh);
const ui       = new UI(mesh);

setup(mesh);
ui._updateStatusBar();

// ── Drag state ──
let dragNode  = null;
let dragOffX  = 0;
let dragOffY  = 0;
let mouseX    = 0;
let mouseY    = 0;
let didDrag   = false;

function canvasXY(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: e.clientX - r.left,
    y: e.clientY - r.top
  };
}

canvas.addEventListener('mousedown', e => {
  const { x, y } = canvasXY(e);
  const node = mesh.nodeAt(x, y);
  didDrag = false;
  if (node) {
    dragNode  = node;
    dragOffX  = x - node.x;
    dragOffY  = y - node.y;
  } else {
    ui.hideInspector();
  }
});

canvas.addEventListener('mousemove', e => {
  const { x, y } = canvasXY(e);
  mouseX = x; mouseY = y;
  if (dragNode) {
    const dx = Math.abs(x - (dragNode.x + dragOffX));
    const dy = Math.abs(y - (dragNode.y + dragOffY));
    if (dx > 3 || dy > 3) didDrag = true;
    dragNode.x = x - dragOffX;
    dragNode.y = y - dragOffY;
  }
});

canvas.addEventListener('mouseup', () => { dragNode = null; });
canvas.addEventListener('mouseleave', () => { dragNode = null; });

canvas.addEventListener('click', e => {
  if (didDrag) return;
  const { x, y } = canvasXY(e);
  const node = mesh.nodeAt(x, y);
  if (node) ui.handleNodeClick(node);
});

canvas.addEventListener('dblclick', e => {
  const { x, y } = canvasXY(e);
  const node = mesh.nodeAt(x, y);
  if (node) ui.handleNodeDblClick(node);
});

// Touch
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const m = new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY });
  canvas.dispatchEvent(m);
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  canvas.dispatchEvent(new MouseEvent('mouseup'));
  if (!didDrag && e.changedTouches.length) {
    const t = e.changedTouches[0];
    canvas.dispatchEvent(new MouseEvent('click', { clientX: t.clientX, clientY: t.clientY }));
  }
});

// ── Simulation: auto-drift other users' states ──
setInterval(() => {
  for (const n of mesh.nodes) {
    if (n.isYou) continue;
    // Small random state nudge every 4s
    const basisIdx = randInt(0, 5);
    n.collapseToward(basisIdx, randFloat(0.02, 0.08));
  }
}, 4000);

// ── Animation loop ──
let lastT = 0;
function loop(ts) {
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;

  mesh.tick(dt);
  renderer.draw();

  // Periodically sync chat header (state drift)
  if (mesh.activeChat && (ts | 0) % 30 === 0) {
    ui.updateChatHeader();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// Open alice chat after a moment (demo)
setTimeout(() => {
  mesh.openChat('alice');
  ui.refreshPanel();
  ui.toast('⊗ Entangled with Alice — double-click any ⊗ node to open channel');
}, 600);

    </style>

    <script>
        // ==================== CORE MODEL ====================

        const COLORS = {
            TRANSFER: '#0a0',
            STAKE: '#fa0',
            CONFIRM: '#06f',
            DISPUTE: '#f33',
            VOTE: '#c0f',
            MERGE: '#a0a',
            GENESIS: '#888'
        };
        const VC = {
            AXIOMATIC: 'v-axiomatic',
            CONFIRMED: 'v-confirmed',
            CLAIMED: 'v-claimed',
            DISPUTED: 'v-disputed'
        };

        let nodes = {
            A: [],
            B: []
        };
        let globalEvents = [];
        let vectorClock = {
            alice: 0,
            bob: 0,
            carol: 0,
            system: 0
        }; // global for demo

        function hash(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) h = (h << 5) - h + str.charCodeAt(i);
            return Math.abs(h).toString(16).padStart(8, '0');
        }

        function createEvent(type, payload, author, causes = []) {
            vectorClock[author] = (vectorClock[author] || 0) + 1;
            const vc = {
                ...vectorClock
            };
            const id = hash(type + JSON.stringify(payload) + author + causes.join('') + Date.now());
            return {
                id,
                type,
                payload,
                author,
                causes,
                ts: Date.now(),
                vectorClock: vc,
                validity: 'CLAIMED'
            };
        }

        function compareVectorClocks(vc1, vc2) {
            let before = true,
                after = true,
                concurrent = false;
            for (let p in vc1) {
                if (vc1[p] < vc2[p]) before = false;
                if (vc1[p] > vc2[p]) after = false;
            }
            if (!before && !after) concurrent = true;
            return {
                before,
                after,
                concurrent
            };
        }

        function isCausallyBefore(ev1, ev2) {
            return compareVectorClocks(ev1.vectorClock, ev2.vectorClock).before;
        }

        function topologicalSort(evs) {
            const sorted = [];
            const visited = new Set();
            const temp = new Set();

            function visit(id) {
                if (temp.has(id)) return; // cycle? shouldn't happen
                if (visited.has(id)) return;
                temp.add(id);
                const ev = evs.find(e => e.id === id);
                if (ev) ev.causes.forEach(visit);
                temp.delete(id);
                visited.add(id);
                sorted.push(ev);
            }

            evs.forEach(e => visit(e.id));
            return sorted.reverse();
        }

        function reduceState(evs) {
            const sorted = topologicalSort(evs);
            let state = {
                balances: {
                    alice: 100,
                    bob: 100,
                    carol: 100
                },
                stakes: {
                    alice: 0,
                    bob: 0,
                    carol: 0
                },
                txns: 0
            };

            for (const ev of sorted) {
                if (ev.validity === 'DISPUTED') continue;
                if (ev.type === 'TRANSFER') {
                    const {
                        from,
                        to,
                        amount
                    } = ev.payload;
                    if ((state.balances[from] || 0) >= amount) {
                        state.balances[from] -= amount;
                        state.balances[to] = (state.balances[to] || 0) + amount;
                        state.txns++;
                    }
                }
                if (ev.type === 'STAKE') {
                    const {
                        from,
                        amount
                    } = ev.payload;
                    if ((state.balances[from] || 0) >= amount) {
                        state.balances[from] -= amount;
                        state.stakes[from] = (state.stakes[from] || 0) + amount;
                    }
                }
                // Validity updates (simplified aBFT-style)
                if (ev.type === 'CONFIRM') {
                    const target = evs.find(e => e.id === ev.payload.target);
                    if (target) target.validity = 'CONFIRMED';
                }
                if (ev.type === 'DISPUTE') {
                    const target = evs.find(e => e.id === ev.payload.target);
                    if (target) target.validity = 'DISPUTED';
                }
            }
            return state;
        }

        // ==================== RENDERING ====================

        function renderEventList(containerId, evs) {
            const el = document.getElementById(containerId);
            el.innerHTML = evs.slice().reverse().map(ev => \`
    <div class="event-item" onclick="selectEvent('\${ev.id}')">
      <div class="ev-dot" style="background:\${COLORS[ev.type]||'#666'}"></div>
      <div>
        <div><span class="ev-type">\${ev.type}</span> 
             <span class="vbadge \${VC[ev.validity]||''}">\${ev.validity}</span></div>
        <div style="font-size:12px;color:#aaa">\${ev.author} • \${ev.id.slice(0,6)}</div>
        <div style="font-size:11px;color:#666">\${JSON.stringify(ev.payload).slice(0,60)}</div>
      </div>
    </div>
  \`).join('');
        }

        function renderState(containerId, state) {
            const html = Object.keys(state.balances).map(k => \`
    <div class="sc">
      <div class="sc-label">\${k}</div>
      <div class="sc-val">\${state.balances[k]}</div>
      <div style="font-size:11px;color:#666">staked \${state.stakes[k]}</div>
    </div>
  \`).join('') + \`<div class="sc"><div class="sc-label">transactions</div><div class="sc-val">\${state.txns}</div></div>\`;
            document.getElementById(containerId).innerHTML = html;
        }

        function renderDAG() {
            const canvas = document.getElementById('dag-canvas');
            const w = canvas.offsetWidth;
            canvas.width = w * 2;
            canvas.height = 360;
            const ctx = canvas.getContext('2d');
            ctx.scale(2, 2);
            ctx.clearRect(0, 0, w, 180);

            const evs = globalEvents;
            if (!evs.length) return;

            // Simple level assignment based on max vector clock sum
            const levels = {};
            evs.forEach((ev, i) => {
                const sum = Object.values(ev.vectorClock).reduce((a, b) => a + b, 0);
                levels[ev.id] = Math.floor(sum / 2);
            });

            const maxLevel = Math.max(...Object.values(levels));
            const xStep = (w - 80) / (maxLevel || 1);
            const pos = {};

            const groups = {};
            evs.forEach(ev => {
                const l = levels[ev.id];
                if (!groups[l]) groups[l] = [];
                groups[l].push(ev);
            });

            Object.keys(groups).forEach(l => {
                const grp = groups[l];
                const yStep = 140 / (grp.length + 1);
                grp.forEach((ev, i) => {
                    pos[ev.id] = {
                        x: 40 + Number(l) * xStep,
                        y: 30 + (i + 1) * yStep
                    };
                });
            });

            // Draw edges
            ctx.lineWidth = 1.5;
            evs.forEach(ev => {
                const p = pos[ev.id];
                if (!p) return;
                ev.causes.forEach(cid => {
                    const cp = pos[cid];
                    if (!cp) return;
                    ctx.beginPath();
                    ctx.moveTo(cp.x, cp.y);
                    ctx.quadraticCurveTo((cp.x + p.x) / 2, cp.y - 20, p.x, p.y);
                    ctx.strokeStyle = ev.type === 'MERGE' ? '#a0a' : '#555';
                    ctx.stroke();
                });
            });

            // Draw nodes
            evs.forEach(ev => {
                const p = pos[ev.id];
                if (!p) return;
                ctx.fillStyle = COLORS[ev.type] || '#666';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = '9px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(ev.id.slice(0, 4), p.x, p.y + 3);

                ctx.font = '8px sans-serif';
                ctx.fillStyle = '#aaa';
                ctx.fillText(ev.type.slice(0, 4), p.x, p.y + 22);
            });
        }

        function renderAll() {
            const horizEl = document.getElementById('horizon');
            horizEl.max = globalEvents.length || 1;
            const horiz = parseInt(horizEl.value);
            const visible = globalEvents.slice(0, horiz || globalEvents.length);
            renderEventList('event-list', visible);
            renderState('state-grid', reduceState(visible));
            renderDAG();
        }

        // ==================== INTERACTIONS ====================

        function emitEvent() {
            const type = document.getElementById('ev-type').value;
            const author = document.getElementById('ev-author').value;
            const amount = parseInt(document.getElementById('ev-amount').value) || 10;

            let payload = {};
            if (type === 'TRANSFER') payload = {
                from: author,
                to: author === 'alice' ? 'bob' : 'alice',
                amount
            };
            else if (type === 'STAKE') payload = {
                from: author,
                amount
            };
            else payload = {
                target: globalEvents.length ? globalEvents[globalEvents.length - 1].id : null
            };

            const causes = globalEvents.length ? [globalEvents[globalEvents.length - 1].id] : [];
            const ev = createEvent(type, payload, author, causes);
            globalEvents.push(ev);

            // Also add to nodes for realism
            nodes.A.push({
                ...ev
            });
            nodes.B.push({
                ...ev
            });

            renderAll();
            renderP2P();
        }

        function emitConcurrent() {
            const base = globalEvents.length ? globalEvents[globalEvents.length - 1].id : null;
            const e1 = createEvent('TRANSFER', {
                from: 'alice',
                to: 'bob',
                amount: 15
            }, 'alice', base ? [base] : []);
            const e2 = createEvent('TRANSFER', {
                from: 'carol',
                to: 'bob',
                amount: 25
            }, 'carol', base ? [base] : []);
            globalEvents.push(e1, e2);
            nodes.A.push(e1);
            nodes.B.push(e2);
            document.getElementById('fork-notice').style.display = 'block';
            renderAll();
            renderP2P();
        }

        function mergeForks() {
            const tips = globalEvents.filter(e => !globalEvents.some(other => other.causes.includes(e.id)));
            if (tips.length < 2) return alert("Need at least two concurrent tips");
            const merge = createEvent('MERGE', {
                merges: tips.map(t => t.id)
            }, 'system', tips.map(t => t.id));
            globalEvents.push(merge);
            nodes.A.push(merge);
            nodes.B.push(merge);
            document.getElementById('fork-notice').style.display = 'none';
            renderAll();
            renderP2P();
        }

        function resetAll() {
            globalEvents = [];
            nodes = {
                A: [],
                B: []
            };
            vectorClock = {
                alice: 0,
                bob: 0,
                carol: 0,
                system: 0
            };
            const genesis = createEvent('GENESIS', {
                balances: {
                    alice: 100,
                    bob: 100,
                    carol: 100
                }
            }, 'system', []);
            genesis.validity = 'AXIOMATIC';
            globalEvents.push(genesis);
            nodes.A.push(genesis);
            nodes.B.push(genesis);
            document.getElementById('fork-notice').style.display = 'none';
            renderAll();
            renderP2P();
        }

        // ==================== P2P ====================

        function gossipLog(msg) {
            const log = document.getElementById('gossip-log');
            const entry = document.createElement('div');
            entry.textContent = \`[\${new Date().toLocaleTimeString()}] \${msg}\`;
            log.prepend(entry);
            if (log.children.length > 25) log.removeChild(log.lastChild);
        }

        function gossipSync() {
            // Full bidirectional gossip
            const setA = new Set(nodes.A.map(e => e.id));
            const setB = new Set(nodes.B.map(e => e.id));

            nodes.B.forEach(ev => {
                if (!setA.has(ev.id)) nodes.A.push({
                    ...ev
                });
            });
            nodes.A.forEach(ev => {
                if (!setB.has(ev.id)) nodes.B.push({
                    ...ev
                });
            });

            gossipLog('Full gossip completed — events exchanged');
            renderP2P();
        }

        function partialGossip() {
            if (!nodes.B.length) return;
            const missing = nodes.B.filter(ev => !nodes.A.some(a => a.id === ev.id));
            if (!missing.length) return gossipLog('No new events from B');
            const pick = missing[Math.floor(Math.random() * missing.length)];
            nodes.A.push({
                ...pick
            });
            gossipLog(\`Partial gossip: A received \${pick.id.slice(0,6)} (\${pick.type}) from B\`);
            renderP2P();
        }

        function renderP2P() {
            ['A', 'B'].forEach(n => {
                const store = nodes[n];
                renderEventList('list' + n, store.slice(-8));
                const state = reduceState(store);
                renderState('state' + n.replace('list', 'state'), state); // reuse
                document.getElementById('hash' + n).textContent = hash(JSON.stringify(state)).slice(0, 8);
            });

            const stateA = reduceState(nodes.A);
            const stateB = reduceState(nodes.B);
            const same = JSON.stringify(stateA) === JSON.stringify(stateB);
            document.getElementById('convergence').innerHTML = same ?
                \`<span style="color:#0a0">✓ Fully Converged</span>\` :
                \`<span style="color:#fa0">\${Math.round(Math.random()*30+70)}% overlap — states diverging</span>\`;
        }

        // ==================== DSL ====================

        const SCHEMA = {
            TRANSFER: {
                from: 'identity',
                to: 'identity',
                amount: 'uint'
            },
            STAKE: {
                from: 'identity',
                amount: 'uint'
            },
            CONFIRM: {
                target: 'hash'
            },
            DISPUTE: {
                target: 'hash'
            },
            VOTE: {
                from: 'identity',
                proposal: 'string',
                weight: 'uint'
            }
        };

        function renderSchema() {
            const container = document.getElementById('schema');
            container.innerHTML = Object.keys(SCHEMA).map(t =>
                \`<span style="background:#2a2a2a;padding:4px 10px;border-radius:6px;font-size:12px">\${t}</span>\`
            ).join('');
        }

        function parseDSL() {
            // Simple parser — improved from original
            const src = document.getElementById('dsl-input').value;
            const out = document.getElementById('dsl-output');

    // Simple DIK implementation for demo
    class SimpleDIK {
      constructor() {
        this.tick = 0;
        this.nodes = new Map();
        this.intents = [];
        this.rootId = 'root';
        
        // Create root
        this.nodes.set(this.rootId, {
          id: this.rootId,
          x: 0, y: 0, w: window.innerWidth - 350, h: window.innerHeight - 100,
          children: []
        });
      }
      
      addNode(id, x, y, w, h, parentId = 'root') {
        const node = { id, x, y, w, h, children: [] };
        this.nodes.set(id, node);
        
        const parent = this.nodes.get(parentId);
        if (parent) {
          parent.children.push(id);
        }
        
        return node;
      }
      
      hitTest(x, y) {
        // Simple hit test
        for (const [id, node] of this.nodes) {
          if (id === 'root') continue;
          if (x >= node.x && x < node.x + node.w &&
              y >= node.y && y < node.y + node.h) {
            return node;
          }
        }
        return null;
      }
      
      processInput(type, x, y) {
        const target = this.hitTest(x, y);
        
        if (target) {
          const intent = {
            type: \`ui.\${type}\`,
            target: target.id,
            x, y,
            tick: this.tick
          };
          
          this.intents.push(intent);
          return intent;
        }
        
        return null;
      }
      
      runFrame() {
        this.tick++;
        return this.intents.slice();
      }
